name: Deploy to GitHub Pages

# Serves output/interactive_map.html and output/choropleth_access_score.png
# from GitHub Pages. Runs whenever main is updated OR on manual dispatch.

on:
  push:
    branches: [main]
    paths:
      - "output/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r output/* _site/
          # Root landing that redirects to the interactive map
          cat > _site/index.html <<'EOF'
          <!doctype html>
          <html><head>
            <meta charset="utf-8">
            <title>Parana Rural Access Equity</title>
            <meta http-equiv="refresh" content="0; url=./interactive_map.html">
            <link rel="canonical" href="./interactive_map.html">
          </head><body>
            <p>Redirecting to <a href="./interactive_map.html">interactive_map.html</a>.</p>
            <p>Portfolio piece by Avner Paes Gomes.
               Full repo: <a href="https://github.com/avnergomes/parana-rural-access-equity">GitHub</a>.
            </p>
          </body></html>
          EOF
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
